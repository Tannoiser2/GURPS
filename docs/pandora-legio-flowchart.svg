<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1900" viewBox="0 0 1500 1900" role="img" aria-labelledby="title desc">
  <title id="title">Pandora-legio: flowchart decisionale della logica di gioco</title>
  <desc id="desc">Diagramma del flusso principale: setup, selezione team, risoluzione azioni, gate della scena, transizioni, movimento e generazione nuova scena.</desc>
  <defs>
    <style>
      .bg { fill: #07111f; }
      .lane { fill: #0d1b2e; stroke: #233a5c; stroke-width: 2; }
      .start { fill: #153b2e; stroke: #37c27a; }
      .process { fill: #10243d; stroke: #4d89d8; }
      .decision { fill: #352611; stroke: #e3a72f; }
      .terminal { fill: #3b1722; stroke: #f05d7b; }
      .data { fill: #261a3d; stroke: #a178f2; }
      .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e8f1ff; font-size: 24px; font-weight: 700; }
      .small { font-size: 19px; font-weight: 500; fill: #b8c7dd; }
      .tiny { font-size: 16px; font-weight: 500; fill: #93a7c1; }
      .lane-title { font-size: 20px; fill: #9cc2ff; font-weight: 800; letter-spacing: 0; }
      .arrow { stroke: #9ab7d8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #67809e; stroke-width: 3; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 8 8; }
      .label { font-size: 17px; font-weight: 700; fill: #f7d47a; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#9ab7d8" />
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#67809e" />
    </marker>
  </defs>

  <rect class="bg" width="1500" height="1900" />
  <text x="750" y="70" text-anchor="middle" class="text" style="font-size:38px">Pandora-legio: Flowchart Decisionale</text>
  <text x="750" y="108" text-anchor="middle" class="small">Backend FastAPI + engine.py: ciclo setup, azioni, esito scena, movimento e nuova scena</text>

  <rect x="70" y="150" width="1360" height="310" rx="18" class="lane" opacity="0.72"/>
  <text x="95" y="190" class="lane-title">1. Setup missione</text>
  <rect x="165" y="225" width="260" height="95" rx="48" class="start"/>
  <text x="295" y="266" text-anchor="middle" class="text">/game/new</text>
  <text x="295" y="294" text-anchor="middle" class="small">empty_game_state()</text>
  <rect x="550" y="225" width="330" height="95" rx="14" class="process"/>
  <text x="715" y="262" text-anchor="middle" class="text">/game/setup</text>
  <text x="715" y="292" text-anchor="middle" class="small">provider, genere, slot</text>
  <rect x="1030" y="225" width="320" height="95" rx="14" class="data"/>
  <text x="1190" y="254" text-anchor="middle" class="text">Team setup</text>
  <text x="1190" y="282" text-anchor="middle" class="small">setting + pool candidati</text>
  <text x="1190" y="308" text-anchor="middle" class="tiny">prepare_team_setup()</text>
  <path d="M425 272 H550" class="arrow"/>
  <path d="M880 272 H1030" class="arrow"/>

  <rect x="70" y="510" width="1360" height="315" rx="18" class="lane" opacity="0.72"/>
  <text x="95" y="550" class="lane-title">2. Avvio partita</text>
  <rect x="150" y="590" width="330" height="95" rx="14" class="process"/>
  <text x="315" y="627" text-anchor="middle" class="text">/game/select-team</text>
  <text x="315" y="657" text-anchor="middle" class="small">sceglie giocatori</text>
  <rect x="600" y="590" width="330" height="95" rx="14" class="data"/>
  <text x="765" y="619" text-anchor="middle" class="text">Genera mondo</text>
  <text x="765" y="647" text-anchor="middle" class="small">missione, canon, mappa, NPC</text>
  <text x="765" y="673" text-anchor="middle" class="tiny">start_game_from_selection()</text>
  <rect x="1060" y="590" width="300" height="95" rx="14" class="process"/>
  <text x="1210" y="627" text-anchor="middle" class="text">Scena iniziale</text>
  <text x="1210" y="657" text-anchor="middle" class="small">refresh_scene_state()</text>
  <path d="M480 637 H600" class="arrow"/>
  <path d="M930 637 H1060" class="arrow"/>
  <path d="M1190 320 C1190 410 315 500 315 590" class="arrow-soft"/>

  <rect x="70" y="875" width="1360" height="600" rx="18" class="lane" opacity="0.72"/>
  <text x="95" y="915" class="lane-title">3. Turno: risoluzione decisionale</text>
  <rect x="145" y="955" width="310" height="95" rx="14" class="process"/>
  <text x="300" y="991" text-anchor="middle" class="text">/game/resolve</text>
  <text x="300" y="1021" text-anchor="middle" class="small">azioni selezionate o intenti liberi</text>
  <polygon points="690,940 895,1002 690,1064 485,1002" class="decision"/>
  <text x="690" y="994" text-anchor="middle" class="text">Giocatore</text>
  <text x="690" y="1023" text-anchor="middle" class="small">può agire?</text>
  <rect x="1000" y="955" width="310" height="95" rx="14" class="process"/>
  <text x="1155" y="985" text-anchor="middle" class="text">Inferisci azione</text>
  <text x="1155" y="1015" text-anchor="middle" class="small">structured o free-text</text>
  <text x="1155" y="1041" text-anchor="middle" class="tiny">skill, stat, ruolo, difficoltà</text>
  <rect x="1000" y="1110" width="310" height="105" rx="14" class="process"/>
  <text x="1155" y="1145" text-anchor="middle" class="text">Tiro e modificatori</text>
  <text x="1155" y="1175" text-anchor="middle" class="small">d6 + stat + item</text>
  <text x="1155" y="1201" text-anchor="middle" class="tiny">- difficoltà - status - minaccia</text>
  <polygon points="690,1098 895,1162 690,1226 485,1162" class="decision"/>
  <text x="690" y="1144" text-anchor="middle" class="text">Tier esito</text>
  <text x="690" y="1173" text-anchor="middle" class="small">critico / pieno / parziale / fail</text>
  <rect x="145" y="1110" width="310" height="105" rx="14" class="process"/>
  <text x="300" y="1145" text-anchor="middle" class="text">Tabella effetto</text>
  <text x="300" y="1175" text-anchor="middle" class="small">progress, threat, HP, heal</text>
  <text x="300" y="1201" text-anchor="middle" class="tiny">apply_effect()</text>
  <polygon points="690,1260 910,1330 690,1400 470,1330" class="decision"/>
  <text x="690" y="1318" text-anchor="middle" class="text">Gate scena</text>
  <text x="690" y="1348" text-anchor="middle" class="small">approccio ammesso?</text>
  <text x="690" y="1373" text-anchor="middle" class="tiny">keyword + allowed/support/blocked</text>
  <rect x="1000" y="1285" width="310" height="95" rx="14" class="process"/>
  <text x="1155" y="1322" text-anchor="middle" class="text">Applica risultati</text>
  <text x="1155" y="1352" text-anchor="middle" class="small">scene progress, threat, time, HP</text>
  <rect x="145" y="1285" width="310" height="95" rx="14" class="terminal"/>
  <text x="300" y="1322" text-anchor="middle" class="text">Penalizza azione</text>
  <text x="300" y="1352" text-anchor="middle" class="small">0 progress, threat minimo +1</text>

  <path d="M455 1002 H485" class="arrow"/>
  <path d="M895 1002 H1000" class="arrow"/>
  <text x="945" y="980" class="label">si</text>
  <path d="M1155 1050 V1110" class="arrow"/>
  <path d="M1000 1162 H895" class="arrow"/>
  <path d="M485 1162 H455" class="arrow"/>
  <path d="M300 1215 C300 1270 470 1270 555 1290" class="arrow"/>
  <path d="M690 1226 V1260" class="arrow"/>
  <path d="M910 1330 H1000" class="arrow"/>
  <text x="930" y="1310" class="label">ok</text>
  <path d="M470 1330 H455" class="arrow"/>
  <text x="425" y="1310" class="label">no</text>

  <rect x="70" y="1525" width="1360" height="285" rx="18" class="lane" opacity="0.72"/>
  <text x="95" y="1565" class="lane-title">4. Transizione e nuova scena</text>
  <polygon points="255,1595 455,1660 255,1725 55,1660" class="decision"/>
  <text x="255" y="1647" text-anchor="middle" class="text">Esito globale</text>
  <text x="255" y="1676" text-anchor="middle" class="small">success / timeout / crisis / continue</text>
  <rect x="550" y="1607" width="300" height="105" rx="14" class="process"/>
  <text x="700" y="1642" text-anchor="middle" class="text">Persistenza</text>
  <text x="700" y="1672" text-anchor="middle" class="small">nodo, NPC, thread, mappa</text>
  <text x="700" y="1698" text-anchor="middle" class="tiny">mission_memory + event_log</text>
  <polygon points="1040,1595 1240,1660 1040,1725 840,1660" class="decision"/>
  <text x="1040" y="1647" text-anchor="middle" class="text">Movimento?</text>
  <text x="1040" y="1676" text-anchor="middle" class="small">più connessioni accessibili?</text>
  <rect x="1215" y="1548" width="230" height="85" rx="14" class="process"/>
  <text x="1330" y="1582" text-anchor="middle" class="text">Scelta utente</text>
  <text x="1330" y="1611" text-anchor="middle" class="small">pending_movement</text>
  <rect x="1215" y="1688" width="230" height="85" rx="14" class="process"/>
  <text x="1330" y="1722" text-anchor="middle" class="text">Auto move</text>
  <text x="1330" y="1751" text-anchor="middle" class="small">best next node</text>
  <rect x="550" y="1780" width="395" height="85" rx="14" class="data"/>
  <text x="747" y="1814" text-anchor="middle" class="text">Genera package scena</text>
  <text x="747" y="1843" text-anchor="middle" class="small">LLM/fallback + nuove action cards</text>
  <rect x="1015" y="1780" width="330" height="85" rx="14" class="start"/>
  <text x="1180" y="1814" text-anchor="middle" class="text">Nuovo turno</text>
  <text x="1180" y="1843" text-anchor="middle" class="small">state.selected_actions = {}</text>

  <path d="M1155 1380 C1155 1480 255 1500 255 1595" class="arrow"/>
  <path d="M455 1660 H550" class="arrow"/>
  <path d="M850 1660 H840" class="arrow"/>
  <path d="M1240 1660 C1265 1660 1270 1590 1215 1590" class="arrow"/>
  <text x="1260" y="1643" class="label">si</text>
  <path d="M1240 1660 C1265 1660 1270 1730 1215 1730" class="arrow"/>
  <text x="1260" y="1692" class="label">no</text>
  <path d="M1330 1773 C1330 1815 945 1815 945 1822" class="arrow"/>
  <path d="M945 1822 H1015" class="arrow"/>
  <path d="M1180 1780 C1180 1490 1390 1470 1390 1002 C1390 940 1320 930 1310 1002" class="arrow-soft"/>
  <text x="1180" y="1885" text-anchor="middle" class="tiny">Fonti locali: backend/App/main.py, backend/App/engine.py, backend/App/models.py</text>
</svg>
